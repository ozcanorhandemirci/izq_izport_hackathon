<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="İzmir Limanı Emisyon ve Operasyon Zekâsı Platformu — gerçek-zamanlı hava kalitesi, AIS telemetrisi ve karadan güç orkestrasyonu." />
  <meta name="theme-color" content="#0A0F14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#F4F7FA" media="(prefers-color-scheme: light)" />
  <title>İZPORT — Emisyon ve Operasyon Zekâsı</title>

  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('portiq.theme');
        var storedLang  = localStorage.getItem('portiq.lang');
        var theme = (storedTheme === 'dark' || storedTheme === 'light') ? storedTheme : 'dark';
        var lang  = (storedLang === 'tr' || storedLang === 'en') ? storedLang : 'tr';
        document.documentElement.dataset.theme = theme;
        document.documentElement.lang = lang;
      } catch (_) {}
    })();
  </script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script type="module" src="./js/main.js"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <aside id="sidebar" class="app-sidebar" aria-label="Primary navigation"></aside>
    <header id="topbar" class="app-topbar" role="banner"></header>

    <main id="main" class="app-main" role="main">
      <div id="page-root" class="page-root"></div>
    </main>

    <div id="copilot-mount" class="copilot-mount"></div>
    <div id="audit-mount" class="audit-mount"></div>
  </div>

  <noscript>
    <div class="noscript-banner">İZPORT canlı operasyon panelini gösterebilmek için JavaScript gerekiyor.</div>
  </noscript>
</body>
</html>
